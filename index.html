
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My+Cee App</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>My+Cee App</h1>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="refreshButton" type="button" aria-label="シートを再読込" title="シートを再読込">↻</button>
          <button class="secondary-button" id="cpButton" type="button">＋ CP</button>
          <button class="primary-button" id="ideaButton" type="button">＋ アイデア</button>
          <button class="secondary-button" id="todoButton" type="button">＋ やりたいこと</button>
        </div>
      </header>

      <main>
        <section class="spotlight-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Active</p>
              <h2>進行中</h2>
            </div>
            <button class="secondary-button" id="cpButtonInline" type="button">＋ CP</button>
          </div>
          <div class="spotlight-grid" id="activeCampaignList"></div>
        </section>

        <section class="spotlight-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Upcoming</p>
              <h2>予定</h2>
            </div>
          </div>
          <div class="spotlight-grid" id="upcomingCampaignList"></div>
        </section>

        <section class="calendar-section" aria-label="月刊カレンダー">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Monthly Calendar</p>
              <h2>月刊カレンダー</h2>
            </div>
            <div class="calendar-actions">
              <button class="icon-button" id="prevMonthButton" type="button" aria-label="前の月" title="前の月">‹</button>
              <strong id="calendarLabel"></strong>
              <button class="icon-button" id="nextMonthButton" type="button" aria-label="次の月" title="次の月">›</button>
              <button class="secondary-button" id="todayButton" type="button">今月</button>
            </div>
          </div>
          <div class="monthly-calendar" id="monthlyCalendar"></div>
        </section>

        <section class="unscheduled-section" aria-label="未定のスケジュール">
          <div class="section-heading">
            <div>
              <p class="eyebrow">TBD</p>
              <h2>未定のスケジュール</h2>
            </div>
          </div>
          <div class="spotlight-grid" id="unscheduledCampaignList"></div>
        </section>

        <section class="idea-section" aria-label="アイデア">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Ideas</p>
              <h2>アイデア蓄積</h2>
            </div>
            <button class="secondary-button" id="ideaButtonInline" type="button">＋ 追加</button>
          </div>
          <div class="idea-grid" id="ideaGrid"></div>
        </section>

        <section class="todo-section" aria-label="やりたいこと">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Want To Do</p>
              <h2>やりたいこと</h2>
            </div>
            <button class="secondary-button" id="todoButtonInline" type="button">＋ 追加</button>
          </div>
          <div class="todo-grid" id="todoGrid"></div>
        </section>

        <div class="sheet-status footer-sheet-status">
          <span class="pulse-dot" id="connectionDot"></span>
          <span id="connectionStatus">Googleシートを確認中</span>
        </div>
      </main>
    </div>

    <dialog id="cpDialog" class="app-dialog">
      <form id="cpForm" method="dialog">
        <div class="dialog-header">
          <div>
            <p class="eyebrow">New CP</p>
            <h2>CPを追加</h2>
          </div>
          <button class="icon-button" id="closeCpDialog" type="button" aria-label="閉じる" title="閉じる">×</button>
        </div>

        <label>
          <span>CP名</span>
          <input name="name" required maxlength="80" placeholder="例：夏の集中ケアCP" />
        </label>

        <div class="form-grid">
          <label>
            <span>商材名</span>
            <select name="product" required></select>
          </label>
          <label>
            <span>対象チャネル</span>
            <select name="channel">
              <option>AD</option>
              <option>インフルエンサー</option>
              <option>SNS</option>
              <option>店舗</option>
              <option>CRM</option>
              <option>イベント</option>
              <option>EC</option>
              <option>その他</option>
            </select>
          </label>
        </div>

        <div class="form-grid">
          <label>
            <span>開始日</span>
            <input name="startDate" type="date" required />
          </label>
          <label>
            <span>終了日</span>
            <input name="endDate" type="date" required />
          </label>
        </div>

        <label class="checkbox-label">
          <input name="dateTbd" type="checkbox" />
          <span>日程未定</span>
        </label>

        <label>
          <span>担当者</span>
          <input name="owner" maxlength="40" placeholder="例：黒木" />
        </label>

        <label>
          <span>内容・詳細</span>
          <textarea name="detail" rows="4" maxlength="500" placeholder="施策内容、狙い、必要素材、確認事項など"></textarea>
        </label>

        <div class="form-grid">
          <label>
            <span>CP URL</span>
            <input name="cpUrl" type="url" maxlength="300" placeholder="https://..." />
          </label>
          <label>
            <span>その他URL</span>
            <input name="otherUrl" type="url" maxlength="300" placeholder="https://..." />
          </label>
        </div>

        <label>
          <span>確認事項</span>
          <input name="needs" maxlength="160" placeholder="例：画像素材、LP、広告文、代理店確認" />
        </label>

        <div class="dialog-actions">
          <button class="primary-button" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="ideaDialog" class="app-dialog">
      <form id="ideaForm" method="dialog">
        <div class="dialog-header">
          <div>
            <p class="eyebrow">New Idea</p>
            <h2>アイデアを追加</h2>
          </div>
          <button class="icon-button" id="closeDialog" type="button" aria-label="閉じる" title="閉じる">×</button>
        </div>

        <label>
          <span>アイデア名</span>
          <input name="title" required maxlength="80" placeholder="例：夏の集中ケアセット企画" />
        </label>

        <div class="form-grid">
          <label>
            <span>商材名</span>
            <select name="product" required></select>
          </label>
          <label>
            <span>記入者</span>
            <input name="writer" maxlength="40" placeholder="例：黒木" />
          </label>
        </div>

        <label>
          <span>内容・詳細</span>
          <textarea name="detail" rows="4" maxlength="500" placeholder="狙い、ターゲット、必要素材、懸念点など"></textarea>
        </label>

        <label>
          <span>URL</span>
          <input name="url" type="url" maxlength="300" placeholder="https://..." />
        </label>

        <div class="dialog-actions">
          <button class="secondary-button" id="exportIdeas" type="button">CSV出力</button>
          <button class="primary-button" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="todoDialog" class="app-dialog">
      <form id="todoForm" method="dialog">
        <div class="dialog-header">
          <div>
            <p class="eyebrow">New Want</p>
            <h2>やりたいことを追加</h2>
          </div>
          <button class="icon-button" id="closeTodoDialog" type="button" aria-label="閉じる" title="閉じる">×</button>
        </div>

        <label>
          <span>やりたいこと</span>
          <input name="title" required maxlength="80" placeholder="例：次回企画の素材整理" />
        </label>

        <label>
          <span>商材名</span>
          <select name="product" required></select>
        </label>

        <label>
          <span>詳細</span>
          <textarea name="detail" rows="4" maxlength="500" placeholder="背景、狙い、必要な確認など"></textarea>
        </label>

        <label>
          <span>記入者</span>
          <input name="writer" maxlength="40" placeholder="例：黒木" />
        </label>

        <div class="dialog-actions">
          <button class="primary-button" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="detailDialog" class="app-dialog detail-dialog">
      <div class="detail-content">
        <div class="dialog-header">
          <div>
            <p class="eyebrow" id="detailKind">Detail</p>
            <h2 id="detailTitle">詳細</h2>
          </div>
          <button class="icon-button" id="closeDetailDialog" type="button" aria-label="閉じる" title="閉じる">×</button>
        </div>
        <div class="detail-body" id="detailBody"></div>
        <div class="dialog-actions detail-actions">
          <button class="secondary-button" id="editDetailButton" type="button">編集</button>
          <button class="danger-button" id="deleteDetailButton" type="button">削除</button>
        </div>
      </div>
    </dialog>

    <script src="./script.js"></script>
  </body>
</html>
